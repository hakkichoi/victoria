<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — VICTORIA</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="seal"></span> VICTORIA</a>
    <nav class="nav-links">
      <a href="mypage.html" data-i18n="nav.mypage">마이페이지</a>
    </nav>
    <div class="nav-right">
      <div class="lang-switch">
        <select id="langSwitch" aria-label="Language" data-lang-select>
          <option value="ko" title="한국어">KO</option><option value="en" title="English">EN</option>
          <option value="zh" title="中文">ZH</option><option value="ja" title="日本語">JA</option><option value="es" title="Español">ES</option>
        </select>
      </div>
      <a href="#" class="btn btn-gold btn-sm" data-action="logout" data-i18n="nav.logout">로그아웃</a>
    </div>
  </div>
</header>

<div class="wrap" style="padding:44px 24px 90px;">
  <h1 data-i18n="admin.title" style="margin-bottom:10px;">관리자 · 교환 신청 관리</h1>
  <div id="adminGate" class="empty-state" style="display:none; margin-top:24px;"></div>

  <div id="adminContent" style="display:none;">
    <div class="cards-3" style="grid-template-columns:1fr 1fr; margin:28px 0 40px;">
      <div class="card card-cream">
        <h3 data-i18n="admin.rate_manage_title">오늘의 USDT↔BLC 환율</h3>
        <form id="rateForm" style="display:flex; gap:10px; margin-top:14px;">
          <input type="text" inputmode="decimal" id="rateInput" placeholder="1.00" style="flex:1;">
          <button type="submit" class="btn btn-gold" data-i18n="admin.rate_save">환율 저장</button>
        </form>
        <p class="form-msg" id="rateMsg"></p>
      </div>
      <div class="card card-cream">
        <h3 data-i18n="admin.price_manage_title">BLC 가격 입력 (그래프용)</h3>
        <form id="priceForm" style="display:flex; gap:10px; margin-top:14px;">
          <input type="date" id="priceDate" style="flex:1;">
          <input type="text" inputmode="decimal" id="priceInput" placeholder="0.00" style="flex:1;">
          <button type="submit" class="btn btn-gold" data-i18n="admin.price_save">가격 저장</button>
        </form>
        <p class="form-msg" id="priceMsg"></p>
      </div>
    </div>

    <div class="card card-cream" style="margin-bottom:40px;">
      <h3 data-i18n="admin.payment_settings_title">결제 정보 관리</h3>
      <form id="paymentSettingsForm" style="display:flex; flex-direction:column; gap:10px; margin-top:14px; max-width:480px;">
        <label class="hint" data-i18n="admin.tron_wallet_label" style="margin:0;">관리자 트론 지갑 주소</label>
        <input type="text" id="settingsTronWallet" placeholder="T...">
        <label class="hint" data-i18n="admin.bank_name_label" style="margin:10px 0 0;">은행명</label>
        <input type="text" id="settingsBankName">
        <label class="hint" data-i18n="admin.bank_account_label" style="margin:10px 0 0;">계좌번호</label>
        <input type="text" id="settingsBankAccount">
        <label class="hint" data-i18n="admin.bank_holder_label" style="margin:10px 0 0;">예금주명</label>
        <input type="text" id="settingsBankHolder">
        <button type="submit" class="btn btn-gold" style="margin-top:8px; align-self:flex-start;" data-i18n="admin.rate_save">저장하기</button>
      </form>
      <p class="form-msg" id="paymentSettingsMsg"></p>
    </div>

    <div class="cards-3" style="grid-template-columns:1fr 1fr; margin:0 0 40px;">
      <div class="card card-cream">
        <h3 data-i18n="admin.funding_add_title">거래 내역 추가</h3>
        <form id="fundingTxForm" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;">
          <input type="date" id="fundingTxDate" required>
          <input type="text" id="fundingTxAddress" data-i18n-placeholder="admin.tx_address_label" placeholder="트랜잭션 주소" required>
          <input type="text" inputmode="decimal" id="fundingTxAmount" data-i18n-placeholder="admin.tx_amount_label" placeholder="금액 (USDT)" required>
          <button type="submit" class="btn btn-gold" data-i18n="admin.funding_add_button">추가하기</button>
        </form>
        <p class="form-msg" id="fundingTxMsg"></p>
      </div>
      <div class="card card-cream">
        <h3 data-i18n="admin.funding_summary_title">펀딩 요약 통계</h3>
        <form id="fundingSummaryForm" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;">
          <input type="text" inputmode="numeric" id="sumWallets" data-i18n-placeholder="admin.total_wallets_label" placeholder="총 참여 지갑 수">
          <input type="text" inputmode="decimal" id="sumCumulative" data-i18n-placeholder="admin.cumulative_label" placeholder="누적 금액 (USDT)">
          <input type="text" inputmode="numeric" id="sumRewardCount" data-i18n-placeholder="admin.reward_count_label" placeholder="총 보상 횟수">
          <input type="text" inputmode="decimal" id="sumRewardAmount" data-i18n-placeholder="admin.reward_amount_label" placeholder="보상 금액 (USDT)">
          <button type="submit" class="btn btn-gold" data-i18n="admin.rate_save">저장하기</button>
        </form>
        <p class="form-msg" id="fundingSummaryMsg"></p>
      </div>
    </div>

    <div style="margin-bottom:56px;">
      <h3 data-i18n="admin.funding_list_title" style="margin-bottom:16px;">등록된 거래 내역</h3>
      <div id="fundingAdminList"></div>
    </div>

    <div class="card card-cream" style="margin-bottom:24px;">
      <h3 data-i18n="admin.planning_title">사업 일정 관리</h3>
      <form id="planningForm" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; align-items:flex-start;">
        <input type="hidden" id="planningEditId" value="">
        <input type="month" id="planningPeriod" required style="flex:0 0 160px;">
        <input type="text" id="planningTitle" data-i18n-placeholder="admin.planning_title_label" placeholder="제목" required style="flex:1 1 200px;">
        <input type="text" id="planningDetail" data-i18n-placeholder="admin.planning_detail_label" placeholder="상세 내용" style="flex:2 1 260px;">
        <button type="submit" class="btn btn-gold" id="planningSubmitBtn" data-i18n="admin.planning_add_button">추가하기</button>
        <button type="button" class="btn btn-outline" id="planningCancelBtn" data-i18n="admin.planning_cancel_button" style="display:none;">취소</button>
      </form>
      <p class="form-msg" id="planningMsg"></p>
    </div>

    <div style="margin-bottom:56px;">
      <h3 data-i18n="admin.planning_list_title" style="margin-bottom:16px;">등록된 사업 일정</h3>
      <div id="planningAdminList"></div>
    </div>

    <div class="admin-toolbar">
      <button class="filter-chip active" data-filter="all" data-i18n="admin.filter_all">전체</button>
      <button class="filter-chip" data-filter="pending" data-i18n="admin.filter_pending">신청됨</button>
      <button class="filter-chip" data-filter="tx_submitted" data-i18n="admin.filter_submitted">거래정보 제출됨</button>
      <button class="filter-chip" data-filter="completed" data-i18n="admin.filter_completed">완료</button>
    </div>

    <div id="requestsTable"></div>

    <h3 data-i18n="admin.krw_requests_title" style="margin:56px 0 16px;">원화(KRW) 구매 신청 관리</h3>
    <div class="admin-toolbar">
      <button class="filter-chip krw-filter-chip active" data-filter="all" data-i18n="admin.filter_all">전체</button>
      <button class="filter-chip krw-filter-chip" data-filter="pending" data-i18n="admin.filter_pending">신청됨</button>
      <button class="filter-chip krw-filter-chip" data-filter="deposit_submitted" data-i18n="admin.filter_deposit_submitted">입금자명 제출됨</button>
      <button class="filter-chip krw-filter-chip" data-filter="completed" data-i18n="admin.filter_completed">완료</button>
    </div>

    <div id="krwRequestsTable"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/admin.js"></script>
</body>
</html>
