<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — VICTORIA</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="seal"></span> VICTORIA</a>
    <div class="nav-right">
      <div class="lang-switch">
        <select id="langSwitch" aria-label="Language">
          <option value="ko">한국어</option><option value="en">English</option>
          <option value="zh">中文</option><option value="ja">日本語</option><option value="es">Español</option>
        </select>
      </div>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card" style="max-width:480px;">
    <h1 data-i18n="auth.signup_title">회원가입</h1>
    <p style="margin-bottom:26px;" data-i18n="auth.signup_subtitle">이메일 인증 후 계정을 만들 수 있습니다.</p>

    <!-- STEP 1: details + send code -->
    <form id="signupForm">
      <div class="form-row">
        <label data-i18n="auth.email_label">이메일</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-row">
        <label data-i18n="auth.password_label">비밀번호</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-row">
        <label data-i18n="auth.password_confirm_label">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-row">
        <label data-i18n="auth.name_label">이름 (선택)</label>
        <input type="text" id="fullName" autocomplete="name">
      </div>
      <div class="form-row">
        <label data-i18n="auth.phone_label">전화번호 (선택)</label>
        <input type="tel" id="phone" autocomplete="tel">
      </div>
      <div class="form-row">
        <label data-i18n="auth.wallet_label">트론(Tron) 지갑 주소</label>
        <input type="text" id="tronWallet" placeholder="T...">
        <div class="hint" data-i18n="auth.wallet_hint">지금 입력하지 않아도 되며, 마이페이지에서 언제든 등록·수정할 수 있습니다.</div>
      </div>
      <div class="form-row">
        <label data-i18n="auth.telegram_label">텔레그램 아이디 (선택)</label>
        <input type="text" id="telegram" placeholder="@username">
      </div>
      <div class="form-row">
        <label data-i18n="auth.whatsapp_label">Whatsapp 아이디 (선택)</label>
        <input type="text" id="whatsapp">
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="sendOtpBtn" data-i18n="auth.send_otp_button">인증번호 받기</button>
      <p class="form-msg" id="signupMsg"></p>
    </form>

    <!-- STEP 2: otp verification (hidden until code sent) -->
    <form id="otpForm" style="display:none; margin-top:22px;">
      <div class="form-row">
        <label data-i18n="auth.otp_label">이메일 인증번호</label>
        <div class="otp-row">
          <input type="text" id="otpCode" inputmode="numeric" maxlength="6" required>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block" data-i18n="auth.otp_verify_button">인증 확인</button>
      <p class="form-msg" id="otpMsg"></p>
    </form>

    <p class="foot-link">
      <span data-i18n="auth.have_account">이미 계정이 있으신가요?</span>
      <a href="login.html" class="gold" data-i18n="auth.login_link">로그인</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/app.js"></script>
<script>
let pendingProfile = null;
let pendingEmail = null;

document.getElementById('signupForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msg = document.getElementById('signupMsg');
  msg.textContent = ''; msg.className = 'form-msg';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const passwordConfirm = document.getElementById('passwordConfirm').value;

  if (password !== passwordConfirm){
    msg.textContent = i18n.t('auth.password_confirm_label') + ' ✕';
    msg.className = 'form-msg error';
    return;
  }

  pendingProfile = {
    full_name: document.getElementById('fullName').value.trim() || null,
    phone: document.getElementById('phone').value.trim() || null,
    tron_wallet: document.getElementById('tronWallet').value.trim() || null,
    telegram_id: document.getElementById('telegram').value.trim() || null,
    whatsapp_id: document.getElementById('whatsapp').value.trim() || null
  };
  pendingEmail = email;

  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true;

  const { error } = await sb.auth.signUp({ email, password });
  btn.disabled = false;

  if (error){
    msg.textContent = error.message;
    msg.className = 'form-msg error';
    return;
  }

  msg.textContent = '';
  document.getElementById('otpForm').style.display = 'block';
  document.getElementById('signupForm').querySelectorAll('input, button').forEach(el => el.disabled = true);
});

document.getElementById('otpForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msg = document.getElementById('otpMsg');
  msg.textContent = ''; msg.className = 'form-msg';

  const token = document.getElementById('otpCode').value.trim();
  const { data, error } = await sb.auth.verifyOtp({ email: pendingEmail, token, type: 'signup' });

  if (error){
    msg.textContent = error.message;
    msg.className = 'form-msg error';
    return;
  }

  // the DB trigger already created a bare profile row on signUp; now fill in the rest
  if (data.user && pendingProfile){
    await sb.from('profiles').update(pendingProfile).eq('id', data.user.id);
  }

  window.location.href = 'mypage.html';
});
</script>
</body>
</html>
