<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — VICTORIA</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="seal"></span> VICTORIA</a>
    <div class="nav-right">
      <div class="lang-switch">
        <select id="langSwitch" aria-label="Language" data-lang-select>
          <option value="ko" title="한국어">KO</option><option value="en" title="English">EN</option>
          <option value="zh" title="中文">ZH</option><option value="ja" title="日本語">JA</option><option value="es" title="Español">ES</option>
        </select>
      </div>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card" style="max-width:480px;">
    <h1 data-i18n="auth.signup_title">회원가입</h1>
    <p style="margin-bottom:26px;" data-i18n="auth.signup_subtitle">이메일 인증 후 계정을 만들 수 있습니다.</p>

    <!-- details, then Supabase sends a confirmation link (no SMTP setup needed) -->
    <form id="signupForm">
      <div class="form-row">
        <label data-i18n="auth.email_label">이메일</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-row">
        <label data-i18n="auth.password_label">비밀번호</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-row">
        <label data-i18n="auth.password_confirm_label">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-row">
        <label data-i18n="auth.name_label">이름 (선택)</label>
        <input type="text" id="fullName" autocomplete="name">
      </div>
      <div class="form-row">
        <label data-i18n="auth.phone_label">전화번호 (선택)</label>
        <input type="tel" id="phone" autocomplete="tel">
      </div>
      <div class="form-row">
        <label data-i18n="auth.wallet_label">트론(Tron) 지갑 주소</label>
        <input type="text" id="tronWallet" placeholder="T...">
        <div class="hint" data-i18n="auth.wallet_hint">지금 입력하지 않아도 되며, 마이페이지에서 언제든 등록·수정할 수 있습니다.</div>
      </div>
      <div class="form-row">
        <label data-i18n="auth.telegram_label">텔레그램 아이디 (선택)</label>
        <input type="text" id="telegram" placeholder="@username">
      </div>
      <div class="form-row">
        <label data-i18n="auth.whatsapp_label">Whatsapp 아이디 (선택)</label>
        <input type="text" id="whatsapp">
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="signupBtn" data-i18n="auth.signup_button">회원가입 완료</button>
      <p class="form-msg" id="signupMsg"></p>
    </form>

    <div id="checkEmailNotice" style="display:none; text-align:center; padding:20px 0;">
      <div class="seal" style="font-size:30px; color:var(--ink); margin:0 auto 14px;"></div>
      <h3 data-i18n="auth.check_email_title" style="margin-bottom:8px;">이메일을 확인해주세요</h3>
      <p data-i18n="auth.check_email_desc" style="margin:0;">인증 링크를 클릭하시면 가입이 완료되고 자동으로 로그인됩니다.</p>
    </div>

    <p class="foot-link">
      <span data-i18n="auth.have_account">이미 계정이 있으신가요?</span>
      <a href="login.html" class="gold" data-i18n="auth.login_link">로그인</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/app.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msg = document.getElementById('signupMsg');
  msg.textContent = ''; msg.className = 'form-msg';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const passwordConfirm = document.getElementById('passwordConfirm').value;

  if (password !== passwordConfirm){
    msg.textContent = i18n.t('auth.password_confirm_label') + ' ✕';
    msg.className = 'form-msg error';
    return;
  }

  const pendingProfile = {
    full_name: document.getElementById('fullName').value.trim() || null,
    phone: document.getElementById('phone').value.trim() || null,
    tron_wallet: document.getElementById('tronWallet').value.trim() || null,
    telegram_id: document.getElementById('telegram').value.trim() || null,
    whatsapp_id: document.getElementById('whatsapp').value.trim() || null
  };
  // survives the round-trip through the user's email client back to mypage.html
  localStorage.setItem('victoria_pending_profile', JSON.stringify(pendingProfile));

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;

  // send the user straight to My Page once they click the confirmation link
  const redirectTo = window.location.href.replace(/signup\.html.*$/, 'mypage.html');

  const { error } = await sb.auth.signUp({
    email, password,
    options: { emailRedirectTo: redirectTo }
  });
  btn.disabled = false;

  if (error){
    msg.textContent = error.message;
    msg.className = 'form-msg error';
    localStorage.removeItem('victoria_pending_profile');
    return;
  }

  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('checkEmailNotice').style.display = 'block';
});
</script>
</body>
</html>
