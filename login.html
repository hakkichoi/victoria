<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — VICTORIA</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="seal"></span> VICTORIA</a>
    <div class="nav-right">
      <div class="lang-switch">
        <select id="langSwitch" aria-label="Language">
          <option value="ko">한국어</option><option value="en">English</option>
          <option value="zh">中文</option><option value="ja">日本語</option><option value="es">Español</option>
        </select>
      </div>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <h1 data-i18n="auth.login_title">로그인</h1>
    <p style="margin-bottom:26px;" data-i18n="auth.login_subtitle">이메일로 로그인하거나 구글 계정으로 바로 시작하세요.</p>

    <button type="button" class="oauth-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.6 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.3 5.1 29.4 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.8 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.3 5.1 29.4 3 24 3c-7.5 0-14 4.2-17.7 11.7z"/><path fill="#4CAF50" d="M24 45c5.3 0 10.1-2 13.7-5.4l-6.3-5.3C29.4 36 26.9 37 24 37c-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.9 40.7 16.4 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 3-3.2 5.4-6 6.9l6.3 5.3C39.5 37.6 45 31.5 45 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      <span data-i18n="auth.google_button">Google로 계속하기</span>
    </button>

    <div class="divider">or</div>

    <form id="loginForm">
      <div class="form-row">
        <label data-i18n="auth.email_label">이메일</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-row">
        <label data-i18n="auth.password_label">비밀번호</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-gold btn-block" data-i18n="auth.login_button">로그인</button>
      <p class="form-msg" id="loginMsg"></p>
    </form>

    <p class="foot-link">
      <span data-i18n="auth.no_account">아직 계정이 없으신가요?</span>
      <a href="signup.html" class="gold" data-i18n="auth.signup_link">회원가입</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/app.js"></script>
<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

document.getElementById('googleBtn').addEventListener('click', async ()=>{
  const redirect = getParam('redirect') || 'index.html';
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname.replace('login.html','') + redirect }
  });
});

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const msg = document.getElementById('loginMsg');
  msg.textContent = ''; msg.className = 'form-msg';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error){
    msg.textContent = error.message;
    msg.className = 'form-msg error';
    return;
  }
  const redirect = getParam('redirect') || 'index.html';
  window.location.href = redirect;
});
</script>
</body>
</html>
